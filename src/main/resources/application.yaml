spring:
  application:
    name: order-management-system

  datasource:
    url: jdbc:mysql://localhost:3306/order_management
    username: root
    password: ${password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect